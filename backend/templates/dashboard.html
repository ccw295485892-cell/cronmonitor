{% extends "base.html" %}
{% block title %}Dashboard — CronMonitor{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">Dashboard</h1>
<div id="stats" class="grid grid-cols-4 gap-4 mb-8"></div>
<div class="flex justify-between items-center mb-4">
    <h2 class="text-lg font-semibold">Your Monitors</h2>
    <button onclick="showCreate()" class="bg-emerald-600 text-white px-4 py-2 rounded text-sm hover:bg-emerald-500">+ New Monitor</button>
</div>
<div id="monitors" class="space-y-3"></div>

<div id="create-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
    <div class="bg-gray-900 p-6 rounded-lg w-full max-w-md">
        <h3 class="text-lg font-semibold mb-4">New Monitor</h3>
        <input id="mon-name" placeholder="Name (e.g. Daily Backup)" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 mb-3 text-sm">
        <input id="mon-schedule" placeholder="Schedule (e.g. */5 * * * *)" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 mb-3 text-sm">
        <input id="mon-grace" placeholder="Grace minutes (default 5)" type="number" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 mb-4 text-sm">
        <div class="flex gap-2 justify-end">
            <button onclick="hideCreate()" class="px-4 py-2 text-sm text-gray-400">Cancel</button>
            <button onclick="createMonitor()" class="bg-emerald-600 text-white px-4 py-2 rounded text-sm">Create</button>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const API = '/api/monitors';
const token = localStorage.getItem('token');
if (!token) location.href = '/login';

const headers = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };

async function load() {
    const [mRes, sRes] = await Promise.all([
        fetch(API, {headers}),
        fetch(API + '/dashboard/stats', {headers})
    ]);
    const monitors = await mRes.json();
    const stats = await sRes.json();
    document.getElementById('stats').innerHTML = `
        <div class="bg-gray-900 p-4 rounded-lg"><div class="text-3xl font-bold">${stats.total_monitors}</div><div class="text-gray-400 text-sm">Monitors</div></div>
        <div class="bg-gray-900 p-4 rounded-lg"><div class="text-3xl font-bold text-green-400">${stats.monitors_ok}</div><div class="text-gray-400 text-sm">OK</div></div>
        <div class="bg-gray-900 p-4 rounded-lg"><div class="text-3xl font-bold text-yellow-400">${stats.monitors_late}</div><div class="text-gray-400 text-sm">Late</div></div>
        <div class="bg-gray-900 p-4 rounded-lg"><div class="text-3xl font-bold text-red-400">${stats.monitors_down}</div><div class="text-gray-400 text-sm">Down</div></div>`;
    document.getElementById('monitors').innerHTML = monitors.map(m => `
        <div class="bg-gray-900 p-4 rounded-lg flex items-center justify-between">
            <div>
                <a href="/docs/${m.id}" class="font-medium hover:text-emerald-400">${m.name}</a>
                <div class="text-xs text-gray-500 mt-1">Schedule: ${m.schedule} | Grace: ${m.grace_minutes}min</div>
                <div class="text-xs text-gray-500">Ping URL: <code class="text-yellow-400">curl -s ${location.origin}/api/monitors/ping/${m.slug}</code></div>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-xs px-2 py-1 rounded ${m.status==='ok'?'bg-green-900 text-green-400':m.status==='late'?'bg-yellow-900 text-yellow-400':m.status==='down'?'bg-red-900 text-red-400':'bg-gray-800 text-gray-400'}">${m.status||'unknown'}</span>
                <button onclick="deleteMonitor(${m.id})" class="text-red-400 hover:text-red-300 text-sm">Del</button>
            </div>
        </div>`).join('') || '<p class="text-gray-500">No monitors yet. Create one above.</p>';
}

function showCreate() { document.getElementById('create-modal').classList.remove('hidden'); }
function hideCreate() { document.getElementById('create-modal').classList.add('hidden'); }

async function createMonitor() {
    const body = JSON.stringify({
        name: document.getElementById('mon-name').value,
        schedule: document.getElementById('mon-schedule').value,
        grace_minutes: parseInt(document.getElementById('mon-grace').value) || 5
    });
    await fetch(API, {method:'POST', headers, body});
    hideCreate();
    load();
}

async function deleteMonitor(id) {
    if (!confirm('Delete this monitor?')) return;
    await fetch(API + '/' + id, {method:'DELETE', headers});
    load();
}

load();
setInterval(load, 30000);
</script>
{% endblock %}
