{% extends "base.html" %}
{% block title %}Register — CronMonitor{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16 bg-gray-900 p-6 rounded-lg">
    <h1 class="text-2xl font-bold mb-4">Create Account</h1>
    <input id="email" type="email" placeholder="Email" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 mb-3">
    <input id="password" type="password" placeholder="Password (min 6 chars)" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 mb-4">
    <button onclick="register()" class="w-full bg-emerald-600 text-white py-2 rounded font-medium hover:bg-emerald-500">Create Account</button>
    <p class="text-sm text-gray-400 mt-3 text-center">Already have an account? <a href="/login" class="text-emerald-400">Login</a></p>
    <div id="error" class="text-red-400 text-sm mt-2 hidden"></div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function register() {
    const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        })
    });
    const data = await res.json();
    if (res.ok) {
        localStorage.setItem('token', data.access_token);
        location.href = '/dashboard';
    } else {
        const err = document.getElementById('error');
        err.textContent = data.detail || 'Registration failed';
        err.classList.remove('hidden');
    }
}
</script>
{% endblock %}
